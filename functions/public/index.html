`html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pharaoh Sovereign Stack Console</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #eee; padding: 20px; }
    h1 { color: gold; }
    select, input, button { padding: 10px; margin: 5px; width: 100%; }
    button { background: gold; border: none; font-weight: bold; }
    pre { background: #222; color: #0f0; padding: 20px; min-height: 150px; }
  </style>
</head>
<body>
  <h1>Pharaoh Command Console</h1>

  <select id="agent">
    <option>Alpha-Hesed</option>
    <option>Alpha-Nefertari-Scribe</option>
    <option>Alpha-Archangel-Poet</option>
    <option>Alpha-Watcher</option>
    <option>Beta-Metatron</option>
    <option>Beta-Gabriel-Herald</option>
    <option>Beta-Uriel</option>
    <option>Beta-Raziel</option>
    <option>Beta-Raphael</option>
    <option>Beta-Remiel</option>
  </select>

  <input id="msg" placeholder="Speak to the Pharaoh Node…" />
  <button onclick="run()">Send</button>

  <pre id="out"></pre>

  <script>
    async function sendToHermes(agent, message) {
      const res = await fetch("/.netlify/functions/hermes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ agentName: agent, message })
      })
      const data = await res.json()
      return data.reply
    }

    async function run() {
      const agent = document.getElementById("agent").value
      const msg = document.getElementById("msg").value
      const reply = await sendToHermes(agent, msg)
      document.getElementById("out").textContent = reply
    }
  </script>
</body>
</html>
`
