<!DOCTYPE html>
<html>
<head>
  <title>Alpha Node</title>
  <meta charset="utf-8">
</head>
<body>
  <h1>Alpha Node Online 👊😎✊</h1>
  <p>Backend Test Environment. Law 48.</p>
  <button onclick="testHermes()">Test Connection</button>
  <pre id="output"></pre>
  <script>
    async function testHermes() {
      document.getElementById('output').textContent = 'Connecting...';
      const res = await fetch('/api/hermes', {
        method: 'POST',
        body: JSON.stringify({ message: 'Test' })
      });
      const data = await res.json();
      document.getElementById('output').textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
