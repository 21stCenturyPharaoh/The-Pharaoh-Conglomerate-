name: yaml
name: Deploy Hermes + Pages

on:
  push:
    branches:
      - main

jobs:
  deploy-hermes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      
      - run: npm install
      
      - name: Deploy Hermes Agent
        run: npx wrangler deploy
        env:
          CLOUDFLAREAPITOKEN: ${{ secrets.CLOUDFLAREAPITOKEN }}

  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      
      - run: npm install
      - run: npm run build
      
      - name: Deploy Pharaoh Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLAREAPITOKEN }}
          accountId: ${{ secrets.CLOUDFLAREACCOUNTID }}
          projectName: hermes-toth-agent
          directory: dist
