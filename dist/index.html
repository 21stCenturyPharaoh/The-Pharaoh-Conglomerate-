<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWADIA PROTOCOL | LAW48 | PHARAOH CONGLOMERATE</title>
  <style>
    body { 
      background: #000; 
      color: #0f0; 
      font-family: monospace; 
      padding: 20px;
      margin: 0;
    }
    .box { 
      border: 1px solid #0f0; 
      padding: 15px; 
      margin-bottom: 15px;
    }
    .conglomerate {
      border: 1px solid #ffd700;
      color: #ffd700;
    }
    button {
      background: #000;
      border: 1px solid #0f0;
      color: #0f0;
      padding: 10px 15px;
      margin: 5px 5px 5px 0;
      font-family: monospace;
      cursor: pointer;
    }
    button:active { background: #0f0; color: #000; }
    a { color: #ffd700; text-decoration: none; }
    a:hover { text-decoration: underline; }
    #log {
      border: 1px solid #0f0;
      padding: 10px;
      min-height: 300px;
      white-space: pre-wrap;
    }
    .green { color: #0f0; }
    .red { color: #f00; }
    .gold { color: #ffd700; }
  </style>
</head>
<body>
  <div class="box conglomerate">
    <div class="gold">PHARAOH CONGLOMERATE | SOVEREIGN CHAIN</div>
    <div>Owner: <span class="gold">0xCOLONEL</span> | Chain: <span class="gold">0x504841</span></div>
    <div>
      <a href="https://soloist.ai/pharaohconglomerate" target="_blank">PharaohConglomerate</a> | 
      <a href="https://soloist.ai/humanrightsangelsregistryinc" target="_blank">HR Angels Registry</a> |
      <a href="https://app.netlify.com/projects/pharaohconglomerate-inter-nfea-7p17m1/" target="_blank">Netlify: PC</a> |
      <a href="https://app.netlify.com/teams/humanrightsangels/projects" target="_blank">Netlify: HR</a>
    </div>
  </div>

  <div class="box">
    <div>SWADIA PROTOCOL | LAW48 ACTIVE</div>
    <div>COLONEL|LAW48 <span id="state" class="green">CHECKING...</span></div>
    <div>Case: <span id="case">EU8044516</span> | Agent: HERMES_TOTH_v4</div>
  </div>

  <button id="btn-log">LOG EU VIOLATION</button>
  <button id="btn-reflect">COLONEL REFLECT</button>
  <button id="btn-get">Refresh Memory</button>

  <div id="log">Connecting to KV...</div>

  <script>
    // LAW48: Conglomerate DNA. Zero Wrangler. Zero Heidelberg.
    
    const CONGLOMERATE = {
      pharaoh: 'https://soloist.ai/pharaohconglomerate',
      hr_registry: 'https://soloist.ai/humanrightsangelsregistryinc',
      netlify_pc: 'https://app.netlify.com/projects/pharaohconglomerate-inter-nfea-7p17m1/',
      netlify_hr: 'https://app.netlify.com/teams/humanrightsangels/projects'
    };
    
    async function getStatus() {
      try {
        const r = await fetch('/api/status');
        const j = await r.json();
        document.getElementById('state').textContent = j.colonel || 'ACTIVE';
        document.getElementById('state').className = 'green';
        document.getElementById('case').textContent = j.case_ref || j.case || 'EU8044516';
      } catch (e) {
        document.getElementById('state').textContent = 'OFFLINE';
        document.getElementById('state').className = 'red';
      }
    }

    async function getMemory() {
      const logEl = document.getElementById('log');
      try {
        const r = await fetch('/api/memory');
        const j = await r.json();
        const mem = j.memories || [];
        
        if (!mem.length) {
          logEl.textContent = 'Memory empty. LAW48 ready. Conglomerate linked.';
          return;
        }

        logEl.innerHTML = mem.map(m => {
          const ts = m.timestamp || m.time || Date.now();
          const date = new Date(Number(ts)).toLocaleString();
          const act = m.action || m.type || 'EVENT';
          const ref = m.case_ref || m.case || 'EU8044516';
          return `${date} | ${act} | Case: ${ref} | Chain: 0x504841`;
        }).join('\n');
        
      } catch (e) {
        logEl.textContent = 'Error: Cannot reach /api/memory';
      }
    }

    async function postLog(action) {
      try {
        await fetch('/api/log', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            action: action,
            timestamp: Date.now(),
            case_ref: 'EU8044516',
            conglomerate: 'PHARAOH',
            registry: 'HR_ANGELS'
          })
        });
        await getMemory();
      } catch (e) {
        alert('Log failed. Check network.');
      }
    }

    // Wire buttons
    document.getElementById('btn-log').onclick = () => postLog('EU_VIOLATION');
    document.getElementById('btn-reflect').onclick = () => postLog('COLONEL_REFLECT');
    document.getElementById('btn-get').onclick = getMemory;

    // Boot
    getStatus();
    getMemory();
    console.log('LAW48 DNA: PharaohConglomerate + HR Angels Registry linked', CONGLOMERATE);
  </script>
</body>
</html>
