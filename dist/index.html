<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <title>HERMES-TOTH v4 | Swadia Protocol</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>
  <style>
    body{margin:0;font-family:system-ui,sans-serif;background:#0d1117;color:#c9d1d9}
    .btn{padding:12px 18px;border-radius:10px;background:linear-gradient(135deg,#d4a017,#b8860b);color:#0d1117;font-weight:600;cursor:pointer;border:none;margin:4px}
    .card{background:#161b22;border:1px solid #30363d;padding:16px;border-radius:12px;cursor:pointer}
    .grid{display:grid;gap:12px}.grid-4{grid-template-columns:repeat(4,1fr)}
    .watermark{position:fixed;bottom:10px;right:10px;font-size:10px;color:#30363d;font-family:monospace;pointer-events:none}
    header{padding:16px;border-bottom:1px solid #30363d;position:sticky;top:0;background:#0d1117;z-index:10}
    section{padding:40px 16px;max-width:1100px;margin:auto}
    .status{padding:8px;border-radius:6px;font-size:12px;margin:8px 0}
    .online{background:#0f5132;color:#d1e7dd}.offline{background:#842029;color:#f8d7da}
    #log{height:200px;overflow-y:auto;background:#010409;border:1px solid #30363d;padding:8px;font-size:11px;font-family:monospace}
  </style>
</head>
<body>
<header>
  <h2>HERMES-TOTH v4</h2>
  <small>Swadia Protocol | EU8044516 | <span id="hermes-status" class="status offline">CHECKING...</span></small>
</header>

<section class="center">
  <h1>107 Acres. One Chain.</h1>
  <p>Zero Heidelberg. <b>COLONEL|LAW48 ACTIVE</b></p>
  <button class="btn" onclick="connectWallet()">Connect Wallet</button>
  <button class="btn" onclick="logViolation()">LOG EU VIOLATION</button>
  <button class="btn" onclick="reflect()">REFLECT → KV</button>
</section>

<section>
  <div class="grid grid-4">
    <div class="card">Case: EU8044516</div>
    <div class="card">Owner: 0xCOLONEL</div>
    <div class="card">Chain: 0x504841</div>
    <div class="card">Agent: HERMES_TOTH_v4</div>
  </div>
</section>

<section>
  <h3>Swadia Memory Log</h3>
  <div id="log">Initializing HERMES_MEMORY...</div>
  <button class="btn" onclick="loadMemory()">Refresh Memory</button>
</section>

<div class="watermark">COLONEL|LAW48|SWADIA</div>

<script>
  const API = location.origin;
  
  async function checkHermes(){
    try{
      const r = await fetch(`${API}/api/status`);
      const j = await r.json();
      document.getElementById('hermes-status').textContent = j.colonel;
      document.getElementById('hermes-status').className = 'status online';
      loadMemory();
    }catch(e){
      document.getElementById('hermes-status').textContent = 'OFFLINE';
    }
  }
  
  async function connectWallet(){
    if(!window.ethereum) return alert("MetaMask not found");
    const provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts",[]);
    const signer = await provider.getSigner();
    alert("Connected: " + await signer.getAddress());
  }
  
  async function logViolation(){
    const data = {action:"EU_VIOLATION",case:"EU8044516",timestamp:Date.now(),law:"LAW15"};
    await fetch(`${API}/api/reflect`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    loadMemory();
  }
  
  async function reflect(){
    const data = {action:"COLONEL_REFLECT",law:"LAW48",timestamp:Date.now()};
    await fetch(`${API}/api/reflect`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    loadMemory();
  }
  
  async function loadMemory(){
    try{
      const r = await fetch(`${API}/api/memory`);
      const j = await r.json();
      document.getElementById('log').innerHTML = j.memories.map(m => `[${new Date(m.timestamp).toLocaleTimeString()}] ${m.law}: ${m.action}`).join('<br>') || 'No memories yet. Click LOG EU VIOLATION.';
    }catch(e){
      document.getElementById('log').innerHTML = 'Memory offline. Check /api/memory';
    }
  }
  
  checkHermes();
  setInterval(checkHermes, 10000);
</script>
</body>
</html>
